databases:
  - name: dcf-valuation-db
    plan: free    # NOTE: Render's free Postgres expires 30 days after creation
                  # unless upgraded to a paid plan before then. See DEPLOY.md.

services:
  - type: web
    name: dcf-valuation-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: CACHE_TYPE
        value: SimpleCache
      - key: DATABASE_URL
        fromDatabase:
          name: dcf-valuation-db
          property: connectionString
    # After the first deploy, add this as a Secret File in the Render
    # Dashboard (Environment -> Secret Files) if you want Screener.in
    # auto-download -- it's whole-file content, not a plain env var:
    #   - screener_cookies.json  (see scripts/convert_cookies_to_json.py)
    # Render mounts it at /etc/secrets/screener_cookies.json -- app/config.py
    # already looks there first, automatically.
    #
    # Logins are now self-service signup (DB-backed), not a Secret File --
    # visit /auth/signup on your deployed URL. Set SIGNUP_CODE as a plain
    # env var here if you want to gate signup with a shared code.

{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card mt-5">
      <div class="card-body">
        <h4 class="card-title mb-3">Create an account</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="8">
            <div class="form-text">At least 8 characters.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="8">
          </div>
          {% if require_code %}
          <div class="mb-3">
            <label class="form-label">Signup Code</label>
            <input type="text" name="signup_code" class="form-control" required>
            <div class="form-text">Ask whoever runs this app for the code.</div>
          </div>
          {% endif %}
          <button type="submit" class="btn btn-primary w-100">Sign up</button>
        </form>
        <p class="text-center mt-3 mb-0 small">
          Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
